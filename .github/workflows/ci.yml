# CI: backend pytest (xlsx-export TestClient + decline-math goldens) and the
# frontend typecheck on every push/PR. The suite is pure-function / TestClient
# only — it must NEVER hit Supabase — so it stays fast and dependency-light.
# Mirrors the anduin (permian_type_curve) ci.yml pattern.
#
# No `npm test` step: the frontend has no unit-test script yet — typecheck is
# the frontend gate. No eslint here for the same reason it's out of anduin CI
# (known maplibre-typing lint debt); add `npm run lint` once that's cleared.
name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            packages/decline/pyproject.toml
      # `decline` is the shared math package the backend imports; install it
      # editable FIRST so backend's `decline` dependency resolves locally
      # instead of being fetched from PyPI.
      - run: pip install -e ./packages/decline
      - run: pip install -e "./backend[dev]"
      # Run from the repo root so both backend/tests and
      # packages/decline/tests are collected (22 tests today).
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
